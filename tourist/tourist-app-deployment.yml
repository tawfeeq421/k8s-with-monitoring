apiVersion: apps/v1
kind: Deployment
metadata:
  name: tourist-app-deployment
  namespace: prod
  labels:
    env: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tourist
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tourist
    spec:
      containers:
        - name: my-tourist
          image: tawfeeq421/tourist-app
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 150m
              memory: 120Mi
            limits:
              cpu: 300m
              memory: 240Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5


