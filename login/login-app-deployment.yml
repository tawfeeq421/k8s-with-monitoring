apiversion: apps/v1
kind: Deployment
metadata:
  name: login-app-deployment
  labels:
    env: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login
  strategy:
    type: RollingUpdate
    rolingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: login
    spec:
      containers:
        - name: mylogin-app
          image: tawfeeq421/login
          ports:
            - containerPort: 80
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 150m
              memory: 120Mi
            limits:
              cpu: 300m
              memory: 240Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodsSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5


