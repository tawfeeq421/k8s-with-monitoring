apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-ingress
  namespace: prod
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - example.tourist.com
      secretName: login-tls
  rules:
    - host: example.tourist.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tourist-app-service
                port:
                  number: 80

          - path: /realstate
            pathType: Prefix
            backend:
              service:
                name: realstate-app-service
                port:
                  number: 80


